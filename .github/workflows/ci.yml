name: CI

on:
  push:
    branches: [master, main, "feature/**"]
  pull_request:
    branches: [master, main]

jobs:
  go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: server/go.sum

      - name: Go mod tidy
        run: go mod tidy

      - name: Go test
        env:
          DOMAINS_CONFIG_PATH: ${{ github.workspace }}/config/domains.json
        run: go test -v -count=1 ./...

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tests/requirements-test.txt

      - name: Install test dependencies
        run: pip install -r tests/requirements-test.txt

      - name: Pytest
        env:
          DOMAINS_CONFIG_PATH: config/domains.json
        run: pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build server image
        run: docker build -f Dockerfile.server -t grounded-llm-server:ci .

      - name: Build webapp image
        run: docker build -f Dockerfile.webapp -t grounded-llm-webapp:ci .

      - name: Build python image
        run: docker build -f Dockerfile.python -t grounded-llm-python:ci .
