name: CI

on:
  push:
    branches: [master, main, "feature/**"]
  pull_request:
    branches: [master, main]

jobs:
  go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: server/go.sum

      - name: Go mod tidy
        run: go mod tidy

      - name: Go test
        env:
          DOMAINS_CONFIG_PATH: ${{ github.workspace }}/config/domains.json
        run: go test -v -count=1 ./...

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tests/requirements-test.txt

      - name: Install test dependencies
        run: pip install -r tests/requirements-test.txt

      - name: Pytest
        env:
          DOMAINS_CONFIG_PATH: config/domains.json
        run: pytest tests/ -v --tb=short

  eval-baseline-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate eval JSONL baselines
        run: pip install pytest && pytest tests/test_eval_baseline.py -v

  smoke-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: grounded
          POSTGRES_PASSWORD: grounded
          POSTGRES_DB: grounded
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U grounded -d grounded"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: server/go.sum

      - name: Build and start server
        env:
          DATABASE_URL: postgres://grounded:grounded@localhost:5432/grounded?sslmode=disable
          TELEGRAM_AUTH_DISABLED: "true"
          PYTHON_RAG_URL: http://127.0.0.1:59999/rag/context
          PYTHON_BASE_URL: http://127.0.0.1:59999
          DOMAINS_CONFIG_PATH: ${{ github.workspace }}/config/domains.json
          LOCALES_ROOT: ${{ github.workspace }}/config/locales
          MIGRATIONS_DIR: ${{ github.workspace }}/migrations
          DATA_DIR: ${{ github.workspace }}/data
          UPLOAD_DIR: /tmp/grounded-uploads
          SERVER_PORT: "8080"
          LLM_API_KEY: ci-smoke-key
        run: |
          mkdir -p /tmp/grounded-uploads
          cd server
          go mod tidy
          go build -o ../server-bin .
          cd ..
          ./server-bin &
          echo $! > server.pid
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8080/health; then
              echo "Server ready"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start"
          exit 1

      - name: Smoke test
        run: bash scripts/smoke.sh http://127.0.0.1:8080

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then kill $(cat server.pid) 2>/dev/null || true; fi

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build server image
        run: docker build -f Dockerfile.server -t grounded-llm-server:ci .

      - name: Build webapp image
        run: docker build -f Dockerfile.webapp -t grounded-llm-webapp:ci .

      - name: Build python image
        run: docker build -f Dockerfile.python -t grounded-llm-python:ci .
