version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell

linters-settings:
  errcheck:
    exclude-functions:
      - (io.Closer).Close

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
