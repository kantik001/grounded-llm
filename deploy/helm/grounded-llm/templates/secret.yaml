apiVersion: v1
kind: Secret
metadata:
  name: {{ include "grounded-llm.fullname" . }}-secrets
  labels:
    {{- include "grounded-llm.labels" . | nindent 4 }}
type: Opaque
stringData:
  LLM_API_KEY: {{ .Values.secrets.llmApiKey | quote }}
  TELEGRAM_BOT_TOKEN: {{ .Values.secrets.telegramBotToken | quote }}
  ADMIN_PASSWORD: {{ .Values.secrets.adminPassword | quote }}
  ADMIN_SECRET: {{ .Values.secrets.adminSecret | quote }}
  RAG_SERVICE_TOKEN: {{ .Values.secrets.ragServiceToken | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
