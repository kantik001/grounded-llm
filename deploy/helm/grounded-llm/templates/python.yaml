apiVersion: v1
kind: Service
metadata:
  name: {{ include "grounded-llm.fullname" . }}-python
  labels:
    {{- include "grounded-llm.labels" . | nindent 4 }}
    app.kubernetes.io/component: python
spec:
  ports:
    - port: {{ .Values.python.port }}
      targetPort: http
      name: http
  selector:
    {{- include "grounded-llm.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: python
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "grounded-llm.fullname" . }}-python
  labels:
    {{- include "grounded-llm.labels" . | nindent 4 }}
    app.kubernetes.io/component: python
spec:
  replicas: {{ .Values.python.replicaCount }}
  selector:
    matchLabels:
      {{- include "grounded-llm.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: python
  template:
    metadata:
      labels:
        {{- include "grounded-llm.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: python
    spec:
      containers:
        - name: python
          image: "{{ .Values.python.image.repository }}:{{ .Values.python.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.python.port }}
              name: http
          env:
            - name: PYTHON_SERVICE_PORT
              value: {{ .Values.python.port | quote }}
            - name: ADMIN_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "grounded-llm.fullname" . }}-secrets
                  key: ADMIN_SECRET
            - name: RAG_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "grounded-llm.fullname" . }}-secrets
                  key: RAG_SERVICE_TOKEN
            {{- range $k, $v := .Values.python.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          volumeMounts:
            - name: chroma
              mountPath: /app/chroma_db
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: http
              httpHeaders:
                - name: X-RAG-Service-Token
                  value: {{ .Values.secrets.ragServiceToken | quote }}
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            {{- toYaml .Values.python.resources | nindent 12 }}
      volumes:
        - name: chroma
          persistentVolumeClaim:
            claimName: {{ include "grounded-llm.fullname" . }}-chroma
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "grounded-llm.fullname" . }}-chroma
  labels:
    {{- include "grounded-llm.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.python.persistence.chromaSize }}
