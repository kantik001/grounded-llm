# Default values for grounded-llm Helm chart.
# See docs/en/K8S_DEPLOY.md for production guidance.

global:
  imagePullPolicy: IfNotPresent

postgres:
  enabled: true
  image: pgvector/pgvector:pg16
  storage: 10Gi
  user: grounded
  password: grounded
  database: grounded
  probes:
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 6
    liveness:
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6

server:
  replicaCount: 1
  image:
    repository: ghcr.io/your-org/grounded-llm-server
    tag: latest
  port: 8080
  resources: {}
  env:
    TELEGRAM_AUTH_DISABLED: "false"
    RATE_LIMIT_REQUESTS_PER_MINUTE: "30"
    DEFAULT_LOCALE: en
  # /health = process up; /ready = Postgres + Python RAG
  probes:
    liveness:
      path: /health
      initialDelaySeconds: 10
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    readiness:
      path: /ready
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

python:
  replicaCount: 1
  image:
    repository: ghcr.io/your-org/grounded-llm-python
    tag: latest
  port: 5000
  resources: {}
  persistence:
    chromaSize: 20Gi
  env:
    FORCE_RAG_REINDEX: "false"
    DEFAULT_LOCALE: en
  # startupProbe covers slow embedding model / index warm-up
  probes:
    startup:
      path: /health
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 36
    liveness:
      path: /health
      periodSeconds: 20
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      path: /ready
      initialDelaySeconds: 5
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 3

webapp:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/your-org/grounded-llm-webapp
    tag: latest
  port: 80
  probes:
    liveness:
      path: /
      initialDelaySeconds: 5
      periodSeconds: 20
      timeoutSeconds: 3
      failureThreshold: 3
    readiness:
      path: /
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3

ingress:
  enabled: false
  className: nginx
  host: grounded.example.com
  tls: false

secrets:
  # Set via --set or external Secrets manager in production
  llmApiKey: ""
  telegramBotToken: ""
  adminPassword: ""
  adminSecret: ""
  ragServiceToken: ""

retention:
  messageRetentionDays: 0
  sessionRetentionDays: 0
  intervalHours: 24

serviceAccount:
  create: false
  name: ""
